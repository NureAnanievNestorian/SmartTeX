services:
  db:
    image: postgres:16-alpine
    container_name: smarttex-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${SMARTTEX_IMAGE}
    container_name: smarttex-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8000}:8000"
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && uvicorn SmartTeX.asgi:application --host 0.0.0.0 --port 8000"

  mcp:
    image: ${SMARTTEX_IMAGE}
    container_name: smarttex-mcp
    restart: unless-stopped
    depends_on:
      - web
    env_file:
      - .env
    command: python mcp_http_server.py
    ports:
      - "${MCP_PORT:-9000}:${MCP_PORT:-9000}"

volumes:
  postgres_data:
